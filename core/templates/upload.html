<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Research Paper Submission</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #f8f9fa;
      }
      .upload-card {
        max-width: 500px;
        margin: 50px auto;
        padding: 30px;
        border-radius: 15px;
        background: white;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }
      .btn-submit {
        background-color: #0d6efd;
        color: white;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="upload-card">
        <h3 class="text-center mb-4">📄 Paper Submission Portal</h3>
        <hr />

        <form method="POST" enctype="multipart/form-data">
          {% csrf_token %}

          <div class="mb-3">
            <label class="form-label font-weight-bold"
              >Research Paper Title</label
            >
            <input
              type="text"
              name="title"
              class="form-control"
              placeholder="Enter paper title"
              required
            />
          </div>

          <div class="mb-3">
            <label class="form-label">Select Department</label>
            <select name="department" class="form-select" required>
              <option value="" selected disabled>
                Choose your department...
              </option>
              <option value="CSE">Computer Science (CSE)</option>
              <option value="EEE">Electrical Engineering (EEE)</option>
              <option value="BBA">Business Administration (BBA)</option>
            </select>
          </div>

          <div class="mb-4">
            <label class="form-label">Upload Research File (PDF/DOC)</label>
            <input
              type="file"
              name="paper_file"
              class="form-control"
              accept=".pdf,.doc,.docx"
              required
            />
          </div>

          <div class="d-grid">
            <button type="submit" class="btn btn-submit btn-lg">
              Submit for Review
            </button>
          </div>
        </form>

        <div class="text-center mt-3">
          <a href="/dashboard/" class="text-decoration-none"
            >View Submitted Papers</a
          >
        </div>
      </div>
    </div>
  </body>
</html>
