{% extends "base.html" %}

{% block content %}
<style>
    /* গ্লাস-মরফিজম ব্যাকগ্রাউন্ড এবং শ্যাডো পেপার ইফেক্ট */
    .upload-section {
        background: linear-gradient(rgba(10, 17, 31, 0.9), rgba(10, 17, 31, 0.9)), 
                    url('https://images.unsplash.com/photo-1503676260728-1c00da094a0b?q=80&w=1920&auto=format&fit=crop');
        background-size: cover;
        min-height: 90vh;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 20px;
        padding: 20px;
    }

    .upload-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 40px;
        border-radius: 20px;
        width: 100%;
        max-width: 500px;
        color: white;
        box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    .form-input-pra {
        background: rgba(255, 255, 255, 0.07) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        color: white !important;
        padding: 12px;
        margin-bottom: 20px;
        border-radius: 10px;
    }

    /* ড্রপডাউন অপশনগুলোর কালার ঠিক করার জন্য */
    .form-input-pra option {
        background-color: #1a1a1a;
        color: white;
    }

    .btn-submit-pra {
        background-color: #3B82F6;
        color: white;
        border: none;
        padding: 12px;
        width: 100%;
        border-radius: 10px;
        font-weight: 700;
        transition: 0.3s;
        cursor: pointer;
    }

    .btn-submit-pra:hover {
        background-color: #2563EB;
        transform: translateY(-2px);
    }
</style>

<div class="upload-section">
    <div class="upload-card">
        <div class="text-center mb-4">
            <h3 style="color: #FFCB82; font-weight: 700;">Submit Research Paper</h3>
            <p class="text-muted small">Fill in the details to upload your research.</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} small py-2">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            <label class="small mb-2 text-muted">Research Title</label>
            <input type="text" name="title" class="form-control form-input-pra" placeholder="Enter paper title" required>

            <label class="small mb-2 text-muted">Department</label>
            <select name="department" class="form-control form-input-pra" required>
                <option value="" disabled selected>Select Department</option>
                {% for dept in departments %}
                    <option value="{{ dept.id }}">{{ dept.name }}</option>
                {% endfor %}
            </select>

            <label class="small mb-2 text-muted">Upload Document (PDF)</label>
            <input type="file" name="pdf_file" class="form-control form-input-pra" accept=".pdf" required>

            <button type="submit" class="btn btn-submit-pra mt-2">Submit Paper</button>
        </form>
    </div>
</div>
{% endblock %}
