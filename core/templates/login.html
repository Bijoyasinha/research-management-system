{% extends "base.html" %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 90vh; background-color: #0b1120;">
    <div style="background: #1e293b; padding: 45px; border-radius: 12px; width: 100%; max-width: 400px; border: 1px solid #FF7800; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.5);">
        
        <h2 style="color: #FF7800; margin-bottom: 10px; font-weight: bold;">LOGIN PORTAL</h2>
        <p style="color: #94a3b8; margin-bottom: 35px;">Please enter your credentials</p>

        <form method="POST" action="{% url 'login' %}?next=/dashboard/">
            {% csrf_token %} 
            <input type="text" name="username" placeholder="Username" style="width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #334155; background: #f8fafc; color: #1e293b;" required>
            
            <input type="password" name="password" placeholder="Password" style="width: 100%; padding: 12px; margin-bottom: 25px; border-radius: 8px; border: 1px solid #334155; background: #f8fafc; color: #1e293b;" required>

            <button type="submit" style="width: 100%; padding: 14px; border-radius: 8px; border: none; background: #FF7800; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase;">
                Sign In
            </button>
        </form>

        <p style="margin-top: 25px; color: #94a3b8;">
            New here? <a href="{% url 'register' %}" style="color: #FF7800; text-decoration: none; font-weight: bold;">Create Account</a>
        </p>
    </div>
</div>
{% endblock %}
