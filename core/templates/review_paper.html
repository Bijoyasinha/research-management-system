{% extends "base.html" %}

{% block content %}
<style>
    .review-container {
        max-width: 750px; margin: 40px auto;
        background: rgba(22, 31, 48, 0.8); backdrop-filter: blur(10px);
        border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.05); overflow: hidden;
    }
    .review-header { background: #3B82F6; padding: 15px; text-align: center; color: white; }
    .review-body { padding: 30px; color: #e2e8f0; }
    
    .pra-input {
        background: rgba(255, 255, 255, 0.05) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        color: white !important; border-radius: 10px; padding: 10px; font-size: 13px;
    }
    .label-text { color: #FFCB82; font-size: 13px; font-weight: 600; margin-bottom: 8px; display: block; }
    .label-text i { font-size: 12px; margin-right: 5px; }

    .btn-download-small {
        border: 1.5px solid #3B82F6; color: #3B82F6; background: transparent;
        border-radius: 8px; padding: 6px 15px; font-size: 12px; font-weight: 600;
        text-decoration: none; display: inline-block; transition: 0.3s;
    }
    .btn-download-small:hover { background: #3B82F6; color: white; }

    .btn-submit-final {
        background: #FF7800; color: white; border: none; padding: 12px;
        width: 100%; border-radius: 10px; font-weight: 700; font-size: 14px; margin-top: 20px;
        cursor: pointer; transition: 0.3s;
    }
    .btn-submit-final:hover { background: #e66c00; transform: translateY(-2px); }
</style>

<div class="review-container shadow-lg">
    <div class="review-header">
        <h5 class="mb-0"><i class="fas fa-file-contract me-2"></i> Review Research Paper</h5>
    </div>

    <div class="review-body">
        <div class="mb-4">
            <h3 class="fw-bold text-white mb-1">{{ paper.title }}</h3>
            <p class="text-muted small">
                <i class="fas fa-user-graduate"></i> Student: <strong>{{ paper.student.username }}</strong>
            </p>
            <a href="{{ paper.file.url }}" class="btn-download-small" target="_blank">
                <i class="fas fa-download"></i> Download PDF
            </a>
        </div>

        <hr style="border-color: rgba(255,255,255,0.1);">

        <form method="POST">
            {% csrf_token %}
            <div class="row g-4">
                <div class="col-md-12">
                    <label class="label-text"><i class="fas fa-tasks"></i> Change Status</label>
                    <select name="status" class="form-select pra-input">
                        <option value="pending" {% if paper.status == 'pending' %}selected{% endif %} style="color: black;">Pending</option>
                        <option value="approved" {% if paper.status == 'approved' %}selected{% endif %} style="color: black;">Approved</option>
                        <option value="rejected" {% if paper.status == 'rejected' %}selected{% endif %} style="color: black;">Rejected</option>
                    </select>
                </div>

                <div class="col-md-12">
                    <label class="label-text"><i class="fas fa-edit"></i> Reviewer's Feedback</label>
                    <textarea name="review_text" rows="5" class="form-control pra-input" 
                              placeholder="Add comments for the student...">{{ paper.teacher_review|default:'' }}</textarea>
                </div>
            </div>

            <button type="submit" class="btn-submit-final">
                Update Paper Status & Feedback
            </button>
        </form>
    </div>
</div>
{% endblock %}
