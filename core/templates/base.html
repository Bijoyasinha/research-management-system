<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMS Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        html { scroll-behavior: smooth; }
        body { background-color: #0b1120; color: white; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* নেভিগেশন বার */
        .top-navbar {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            padding: 10px 6%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky; top: 0; z-index: 1000;
        }
        .brand-logo { font-size: 1.5rem; font-weight: 800; color: #FF7800; text-decoration: none; }
        
        .nav-items-center { display: flex; align-items: center; }
        .nav-items-center a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none; margin: 0 15px;
            font-weight: 500; font-size: 0.9rem; transition: 0.3s;
            text-transform: uppercase;
        }
        .nav-items-center a:hover { color: #FF7800; }
        
        /* সার্চ বার */
        .search-container { display: flex; align-items: center; }
        .search-input {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white; border-radius: 5px 0 0 5px;
            padding: 8px 15px; width: 200px; font-size: 0.9rem;
        }
        .search-btn {
            background: #FF7800; color: white; border: none; 
            border-radius: 0 5px 5px 0; padding: 8px 15px; font-weight: 600;
        }

        .main-container { min-height: 80vh; }
    </style>
</head>
<body>
    <nav class="top-navbar">
        <a href="{% url 'home' %}" class="brand-logo text-uppercase">RMS Portal</a>
        
        <div class="nav-items-center d-none d-md-flex">
            <a href="{% url 'home' %}">HOME</a>
            <a href="{% url 'about' %}">About</a>
            <a href="{% url 'contact' %}">CONTACT</a>
            
            {% if user.is_authenticated %}
                <a href="{% url 'dashboard' %}">PAPERS</a>
                <a href="{% url 'logout' %}">LOGOUT</a>
            {% else %}
                <a href="{% url 'login' %}">LOGIN</a>
            {% endif %}
        </div>

        <div class="search-container">
            <input type="text" class="search-input" placeholder="Search papers...">
            <button class="search-btn">SEARCH</button>
        </div>
    </nav>

    {% if messages %}
        <div class="container mt-3">
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        </div>
    {% endif %}

    <div class="main-container">
        {% block content %}{% endblock %}
    </div>

    <footer style="background: #0f172a; color: #64748b; text-align: center; padding: 40px; border-top: 1px solid rgba(255,255,255,0.05); margin-top: 50px;">
        <p>© 2026 <span style="color: #FF7800; font-weight: bold;">RMS PORTAL</span> | Metropolitan University, Sylhet</p>
        <p style="font-size: 0.8rem; margin-top: 5px;">Developed by <span style="color: white;">Bijoya</span></p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
